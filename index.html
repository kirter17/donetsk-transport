<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Донецк Транспорт</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#e8e8e8;color:#1a1a1a;}
#map{position:fixed;inset:0;z-index:1;}
#logo{position:fixed;top:16px;right:72px;z-index:600;display:flex;flex-direction:column;align-items:flex-end;gap:2px;pointer-events:none;}
#logo-name{font-size:17px;font-weight:700;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.7),0 1px 2px rgba(0,0,0,.5);}
#logo-author{font-size:12px;font-weight:500;color:rgba(255,255,255,.85);text-shadow:0 2px 6px rgba(0,0,0,.7);}
#panel{position:fixed;top:0;right:0;bottom:0;width:320px;background:#fff;box-shadow:-2px 0 20px rgba(0,0,0,.12);z-index:700;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1);}
#panel.hidden{transform:translateX(100%);}
#search-wrap{padding:14px 16px 8px;flex-shrink:0;position:relative;}
#search{width:100%;height:38px;background:#f3f4f6;border:none;border-radius:10px;padding:0 14px 0 36px;font-size:14px;color:#1a1a1a;outline:none;}
#search::placeholder{color:#9ca3af;}
.s-ico{position:absolute;left:28px;top:23px;color:#9ca3af;font-size:15px;pointer-events:none;}
#tabs{display:flex;gap:6px;padding:0 16px 10px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#tabs::-webkit-scrollbar{display:none;}
.tab{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;white-space:nowrap;transition:all .15s;}
.tab.active{background:#1a1a2e;border-color:#1a1a2e;color:#fff;}
#list-wrap{flex:1;overflow-y:auto;padding:0 12px;}
.glabel{font-size:10px;font-weight:700;color:#b0b4bc;text-transform:uppercase;letter-spacing:.7px;padding:10px 4px 5px;}
.rrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;margin-bottom:3px;cursor:pointer;border:1.5px solid transparent;transition:background .12s,border-color .12s,opacity .15s;user-select:none;}
.rrow:hover{background:#f7f8fa;}
.rrow.on{border-color:var(--rc);background:color-mix(in srgb,var(--rc) 6%,#fff);}
.rrow.off{opacity:.4;}
.rbadge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.18);transition:transform .15s;}
.rrow:hover .rbadge{transform:scale(1.08);}
.rinfo{flex:1;min-width:0;}
.rname{font-size:13px;font-weight:600;color:#1a1a1a;}
.rends{font-size:11px;color:#8b909a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.rbtn{padding:5px 10px;border-radius:8px;background:transparent;border:1.5px solid #2563eb;font-size:11px;font-weight:600;color:#2563eb;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .12s,color .12s;}
.rbtn:hover{background:#2563eb;color:#fff;}
#detail{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:10;}
#detail.open{transform:translateX(0);}
#dhead{padding:14px 16px 12px;border-bottom:1px solid #f0f1f3;flex-shrink:0;}
#dback{width:36px;height:36px;border-radius:10px;background:#f3f4f6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#374151;flex-shrink:0;transition:background .12s;}
#dback:hover{background:#e5e7eb;}
#dinfo{display:flex;align-items:center;gap:12px;}
#dbadge{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,.2);flex-shrink:0;}
#dtitle{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
#dsub{font-size:12px;color:#8b909a;}
#dcount{font-size:12px;font-weight:600;color:#374151;margin-top:6px;}
#stops-list{flex:1;overflow-y:auto;padding:4px 16px 20px;}
.srow{display:flex;align-items:flex-start;gap:10px;padding:8px 0;}
.sline{display:flex;flex-direction:column;align-items:center;flex-shrink:0;margin-top:2px;}
.sdot{width:10px;height:10px;border-radius:50%;border:2.5px solid var(--dc);background:#fff;flex-shrink:0;}
.sconn{width:2px;height:22px;background:#e5e7eb;}
.sname{flex:1;font-size:13px;color:#374151;line-height:1.4;}
.seta{font-size:12px;font-weight:600;color:var(--dc);white-space:nowrap;padding-top:1px;}
#toggle-btn{position:fixed;top:50%;right:0;transform:translateY(-50%);z-index:800;width:28px;height:56px;background:#fff;border:1px solid #e5e7eb;border-right:none;border-radius:8px 0 0 8px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:-2px 0 8px rgba(0,0,0,.08);font-size:12px;color:#6b7280;}
#overlay{position:fixed;inset:0;z-index:900;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#panel-header{display:none;align-items:center;justify-content:space-between;padding:10px 16px 8px;flex-shrink:0;border-bottom:1px solid #f0f1f3;}
#panel-header button{width:36px;height:36px;border-radius:10px;background:#f3f4f6;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#374151;transition:background .12s;flex-shrink:0;}
#panel-header button:hover{background:#e5e7eb;}
#panel-title{font-size:16px;font-weight:700;color:#1a1a1a;}
.srow.current .sdot{background:#16a34a;border-color:#16a34a;}
.srow.current .sname{color:#16a34a;font-weight:700;}
.srow.current .seta{color:#16a34a;}
.ovt{font-size:15px;color:#374151;font-weight:500;}
.ovs{font-size:13px;color:#9ca3af;text-align:center;max-width:260px;line-height:1.6;}
@media(max-width:639px){
  #panel{width:100%;top:auto;height:40vh;border-radius:16px 16px 0 0;}
  #panel.hidden{transform:translateY(100%);}
  #panel.collapsed{height:64px;overflow:hidden;}
  #panel.full{top:0 !important;height:auto;border-radius:0;}
  #panel.full #panel-header{padding-top:max(10px,env(safe-area-inset-top,10px));}
  #toggle-btn{display:none;}
  #panel-header{display:flex;}
  #search{height:46px;font-size:15px;}
  .tab{padding:7px 15px;font-size:13px;}
  .rrow{padding:13px 12px;margin-bottom:6px;}
  .rbadge{width:42px;height:42px;font-size:14px;}
  .rname{font-size:15px;}
  .rends{font-size:12px;}
  .rbtn{padding:8px 14px;font-size:12px;}
  .glabel{font-size:11px;padding:12px 4px 6px;}
  .sname{font-size:14px;}
  .seta{font-size:13px;}
  #search-wrap{padding:16px 16px 10px;}
  #tabs{padding:0 16px 12px;gap:8px;}
  #list-wrap{padding:0 14px;}
  .s-ico{font-size:20px;top:50%;transform:translateY(-50%);}
}
</style>
</head>
<body>
<div id="map"></div>
<div id="logo">
  <div id="logo-name">Донецк Транспорт</div>
  <div id="logo-author">Кирилл Терлецкий</div>
</div>
<div id="panel">
  <div id="panel-header">
    <button id="btn-collapse" onclick="setPanelState('collapsed')" title="Свернуть"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M3 8l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <span id="panel-title">Маршруты</span>
    <button onclick="setPanelState('full')" title="На весь экран"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 5V1h4M9 1h4v4M1 9v4h4M9 13h4V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>
  <div id="search-wrap">
    <span class="s-ico">⌕</span>
    <input id="search" type="search" placeholder="Поиск маршрута..." oninput="onSearch(this.value)">
  </div>
  <div id="tabs">
    <div class="tab active" onclick="setTab('all',this)">Все</div>
    <div class="tab" onclick="setTab('trolleybus',this)">Троллейбусы</div>
    <div class="tab" onclick="setTab('bus',this)">Автобусы</div>
    <div class="tab" onclick="setTab('tram',this)">Трамваи</div>
  </div>
  <div id="list-wrap"></div>
  <div id="detail">
    <div id="dhead">
      <div id="dinfo">
        <button id="dback" onclick="closeDetail()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5M4 7h7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <div id="dbadge"></div>
        <div><div id="dtitle"></div><div id="dsub"></div><div id="dcount"></div></div>
      </div>
    </div>
    <div id="stops-list"></div>
  </div>
</div>
<div id="toggle-btn" onclick="togglePanel()">◀</div>
<div id="overlay">
  <div class="spinner"></div>
  <div class="ovt" id="ovt">Строим маршруты по дорогам</div>
  <div class="ovs" id="ovs">Прокладываем пути через OSRM...<br>Следующий запуск — мгновенно.</div>
</div>
<script>
const CACHE_KEY = 'dnr_v11';
const TYPE_COLOR = {bus:'#f97316', trolleybus:'#2563eb', tram:'#ef4444'};
const TYPE_LABEL = {bus:'Авт.',trolleybus:'Тролл.',tram:'Трам.'};
const TYPE_FULL  = {bus:'Автобусы',trolleybus:'Троллейбусы',tram:'Трамваи'};
const TYPE_ORDER = ['trolleybus','bus','tram'];
const NUM_BUSES  = {bus:3,trolleybus:3,tram:2};

// ── ДАННЫЕ ОСТАНОВОК (вшиты вручную, точные координаты) ─────────────────────
const RAW_ROUTES = [
  {
    id:'troll2', type:'trolleybus', ref:'2',
    from:'ДМЗ', to:'Ж/д вокзал',
    stops:[
      {name:'ДМЗ',                      lat:47.986820, lon:37.804621},
      {name:'ЦУМ',                      lat:47.988755, lon:37.804595},
      {name:'пр. Павших Коммунаров',    lat:47.991649, lon:37.804555},
      {name:'ДонНТУ',                   lat:47.996082, lon:37.804605},
      {name:'Главпочтамт',              lat:47.998072, lon:37.804600},
      {name:'пр. Гурова',               lat:48.003554, lon:37.804583},
      {name:'Библиотека Крупской',      lat:48.008588, lon:37.804562},
      {name:'Студенческий городок',     lat:48.013037, lon:37.803231},
      {name:'Белый Лебедь',             lat:48.016562, lon:37.802785},
      {name:'пр. Титова',               lat:48.021335, lon:37.800424},
      {name:'пр. Освобождения Донбасса',lat:48.023731, lon:37.798466},
      {name:'ДонУГИ',                   lat:48.027571, lon:37.793665},
      {name:'Донецк Сити',              lat:48.031205, lon:37.789325},
      {name:'ТЦ Северный',              lat:48.036645, lon:37.782988},
      {name:'Шахтёрская пл.',           lat:48.037497, lon:37.778571},
      {name:'ТК Маяк',                  lat:48.037682, lon:37.774304},
      {name:'Горбольница №20',          lat:48.037782, lon:37.768966},
      {name:'ул. Благоева',             lat:48.037846, lon:37.759444},
      {name:'пер. Андреева',            lat:48.039577, lon:37.754154},
      {name:'Горная ул.',               lat:48.041299, lon:37.751194},
      {name:'Ж/д вокзал',              lat:48.043571, lon:37.747283},
    ]
  }
  // Сюда добавим автобусы и трамваи когда ты пришлёшь остановки
];

// ── КАРТА ─────────────────────────────────────────────────────────────────────
const map = L.map('map',{zoomControl:false}).setView([48.015,37.780],13);
L.control.zoom({position:'topleft'}).addTo(map);

// Яндекс → Esri как запасной
const tileSrcs = [
  'https://core-renderer-tiles.maps.yandex.net/tiles?l=map&x={x}&y={y}&z={z}&lang=ru_RU&apikey=a4d63777-4629-40ed-9954-bb493ddbc643',
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
];
let tl=null;
function tryTile(i){
  if(i>=tileSrcs.length)return;
  if(tl)map.removeLayer(tl);
  let ok=false,errs=0;
  tl=L.tileLayer(tileSrcs[i],{maxZoom:18,attribution:'© CartoDB',});
  tl.on('tileload',()=>{if(!ok)ok=true;});
  tl.on('tileerror',()=>{errs++;if(!ok&&errs>=6){ok=true;map.removeLayer(tl);tryTile(i+1);}});
  tl.addTo(map);
}
tryTile(0);

// ── ИКОНКИ ────────────────────────────────────────────────────────────────────
function busIcon(color,ref){
  return L.divIcon({
    html:`<div style="width:22px;height:22px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:${ref.length>2?8:10}px;font-weight:700;color:#fff;font-family:system-ui">${ref}</div>`,
    className:'',iconSize:[22,22],iconAnchor:[11,11]
  });
}
function stopIcon(color){
  return L.divIcon({
    html:`<div style="width:7px;height:7px;background:#fff;border:2px solid ${color};border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,.15)"></div>`,
    className:'',iconSize:[7,7],iconAnchor:[3,3]
  });
}

// ── ANИМАЦИЯ ──────────────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function getPos(c,p){
  const n=c.length-1,s=p*n,i=Math.min(Math.floor(s),n-1),t=s-i;
  return[lerp(c[i][0],c[Math.min(i+1,n)][0],t),lerp(c[i][1],c[Math.min(i+1,n)][1],t)];
}

let allRoutes=[],activeDetailId=null,currentTab='all',searchQ='',panelOpen=true,detailTimer=null;
const layers={},progress={},routeVisible={};

function drawRoute(r){
  const color=TYPE_COLOR[r.type];
  const poly=L.polyline(r.coords,{color,weight:2.5,opacity:.85});
  const stopMarkers=r.stops.map(s=>
    L.marker([s.lat,s.lon],{icon:stopIcon(color)}).bindTooltip(s.name,{direction:'top',offset:[0,-6]})
  );
  const n=NUM_BUSES[r.type]||3;
  progress[r.id]=Array.from({length:n},(_,i)=>i/n);
  const buses=progress[r.id].map((p,bi)=>{
    const m=L.marker(getPos(r.coords,p),{icon:busIcon(color,r.ref)});
    m.on('click',()=>openDetail(r.id));
    return m;
  });
  layers[r.id]={poly,stops:stopMarkers,buses};
}

function setVisible(id,v){
  routeVisible[id]=v;
  const L_=layers[id];if(!L_)return;
  if(v){map.addLayer(L_.poly);L_.stops.forEach(s=>map.addLayer(s));L_.buses.forEach(b=>map.addLayer(b));}
  else{map.removeLayer(L_.poly);L_.stops.forEach(s=>map.removeLayer(s));L_.buses.forEach(b=>map.removeLayer(b));}
}

setInterval(()=>{
  allRoutes.forEach(r=>{
    if(!layers[r.id]||!routeVisible[r.id])return;
    progress[r.id].forEach((p,i)=>{
      progress[r.id][i]=(p+0.00012)%1;
      layers[r.id].buses[i].setLatLng(getPos(r.coords,progress[r.id][i]));
    });
  });
},200);

// ── UI ────────────────────────────────────────────────────────────────────────
const SVG_DOWN=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M3 8l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SVG_UP=`<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 12V2M3 6l4-4 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function setPanelState(s){
  const p=document.getElementById('panel');
  const btn=document.getElementById('btn-collapse');
  p.classList.remove('collapsed','full');
  if(s==='collapsed'){
    p.classList.add('collapsed');
    btn.innerHTML=SVG_UP;
    btn.onclick=()=>setPanelState('half');
    btn.title='Развернуть';
  } else {
    btn.innerHTML=SVG_DOWN;
    btn.onclick=()=>setPanelState('collapsed');
    btn.title='Свернуть';
    if(s==='full')p.classList.add('full');
  }
}
function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('panel').classList.toggle('hidden',!panelOpen);
  document.getElementById('toggle-btn').textContent=panelOpen?'▶':'◀';
}
function setTab(t,el){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');renderList();
}
function onSearch(q){searchQ=q.toLowerCase();renderList();}
function toggleRoute(id){setVisible(id,!routeVisible[id]);renderList();}

function renderStops(r){
  const color=TYPE_COLOR[r.type];
  const progs=progress[r.id]||[];
  const n=r.stops.length;
  const speed=0.0006;
  document.getElementById('stops-list').innerHTML=r.stops.map((s,si)=>{
    const isFirst=si===0,isLast=si===n-1;
    const stopP=n>1?si/(n-1):0;
    let eta='Конечная',isCurrent=false;
    if(!isFirst&&!isLast){
      let minEta=Infinity;
      progs.forEach(busP=>{
        let d=stopP-busP;if(d<0)d+=1;
        if(d<0.015)isCurrent=true;
        const mins=d/speed/60;
        if(mins<minEta)minEta=mins;
      });
      eta=isCurrent?'Здесь':`ещё ${Math.max(1,Math.round(minEta))} мин`;
    }
    return `<div class="srow${isCurrent?' current':''}" style="--dc:${color}">
      <div class="sline"><div class="sdot"></div>${!isLast?'<div class="sconn"></div>':''}</div>
      <div class="sname">${s.name}</div>
      <div class="seta">${eta}</div>
    </div>`;
  }).join('');
}
function openDetail(id){
  const r=allRoutes.find(x=>x.id===id);if(!r)return;
  activeDetailId=id;
  const color=TYPE_COLOR[r.type];
  document.getElementById('dbadge').textContent=r.ref;
  document.getElementById('dbadge').style.background=color;
  document.getElementById('detail').style.setProperty('--dc',color);
  document.getElementById('dtitle').textContent=r.name;
  document.getElementById('dsub').textContent=`${r.from} → ${r.to}`;
  const n=NUM_BUSES[r.type]||3;
  document.getElementById('dcount').textContent=`${n} автобуса на линии`;
  renderStops(r);
  if(detailTimer)clearInterval(detailTimer);
  detailTimer=setInterval(()=>renderStops(r),1500);
  try{map.fitBounds(L.latLngBounds(r.coords),{padding:[60,60]});}catch(e){}
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){
  activeDetailId=null;
  if(detailTimer){clearInterval(detailTimer);detailTimer=null;}
  document.getElementById('detail').classList.remove('open');
}

function renderList(){
  let html='';
  TYPE_ORDER.forEach(type=>{
    if(currentTab!=='all'&&type!==currentTab)return;
    const list=allRoutes.filter(r=>{
      if(r.type!==type)return false;
      if(searchQ&&!r.ref.toLowerCase().includes(searchQ)&&!r.name.toLowerCase().includes(searchQ)&&!(r.from||'').toLowerCase().includes(searchQ)&&!(r.to||'').toLowerCase().includes(searchQ))return false;
      return true;
    });
    if(!list.length)return;
    if(currentTab==='all')html+=`<div class="glabel">${TYPE_FULL[type]}</div>`;
    list.forEach(r=>{
      const on=routeVisible[r.id];
      const color=TYPE_COLOR[r.type];
      html+=`<div class="rrow ${on?'on':'off'}" style="--rc:${color}" onclick="toggleRoute('${r.id}')">
        <div class="rbadge" style="background:${color}">${r.ref}</div>
        <div class="rinfo">
          <div class="rname">${r.name}</div>
          <div class="rends">${r.from||'—'} → ${r.to||'—'}</div>
        </div>
        <button class="rbtn" onclick="event.stopPropagation();openDetail('${r.id}')">Маршрут</button>
      </div>`;
    });
  });
  document.getElementById('list-wrap').innerHTML=html||'<div style="padding:20px;color:#9ca3af;font-size:13px;text-align:center">Ничего не найдено</div>';
}

// ── OSRM — прокладка по дорогам прямо из браузера ────────────────────────────
async function buildRouteCoords(stops) {
  const coordsStr = stops.map(s=>`${s.lon},${s.lat}`).join(';');
  const url = `https://router.project-osrm.org/route/v1/driving/${coordsStr}?overview=full&geometries=geojson`;
  try {
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('OSRM HTTP '+resp.status);
    const data = await resp.json();
    if(data.code !== 'Ok') throw new Error('OSRM: '+data.code);
    return data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
  } catch(e) {
    console.warn('OSRM failed, using straight lines:', e.message);
    // Fallback — прямые линии между остановками
    return stops.map(s=>[s.lat, s.lon]);
  }
}

async function initRoutes() {
  const cacheKey = CACHE_KEY;
  let routes;

  // Проверяем кэш
  try {
    const cached = localStorage.getItem(cacheKey);
    if(cached) {
      routes = JSON.parse(cached);
      if(routes && routes.length) {
        finishInit(routes);
        return;
      }
    }
  } catch(e) {}

  // Строим маршруты через OSRM
  document.getElementById('ovt').textContent = 'Прокладываем маршруты по улицам';
  routes = [];

  for(let i=0; i<RAW_ROUTES.length; i++) {
    const raw = RAW_ROUTES[i];
    document.getElementById('ovs').textContent = `${raw.name || TYPE_LABEL[raw.type]+' '+raw.ref} (${i+1}/${RAW_ROUTES.length})...`;
    const coords = await buildRouteCoords(raw.stops);
    routes.push({...raw, coords, name: `${TYPE_LABEL[raw.type]} ${raw.ref}`});
  }

  try { localStorage.setItem(cacheKey, JSON.stringify(routes)); } catch(e){}
  finishInit(routes);
}

function finishInit(routes) {
  allRoutes = routes;

  // По умолчанию включаем первый маршрут каждого типа
  const defaultOn = new Set();
  TYPE_ORDER.forEach(type => {
    const first = routes.find(r=>r.type===type);
    if(first) defaultOn.add(first.id);
  });

  routes.forEach(r => {
    routeVisible[r.id] = defaultOn.has(r.id);
    drawRoute(r);
    setVisible(r.id, routeVisible[r.id]);
  });

  renderList();

  const vis = routes.filter(r=>routeVisible[r.id]);
  if(vis.length) {
    try { map.fitBounds(L.latLngBounds(vis.flatMap(r=>r.coords)), {padding:[30,30]}); } catch(e){}
  }

  document.getElementById('overlay').style.display = 'none';
}

// Сброс кэша (кнопка в консоли: resetCache())
window.resetCache = () => { localStorage.removeItem(CACHE_KEY); location.reload(); };

initRoutes();
</script>
